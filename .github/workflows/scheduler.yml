name: Milkbasket PO Scheduler

on:
  # Run every 3 hours
  schedule:
    - cron: '0 */3 * * *'

  # Allow manual triggering from GitHub UI
  workflow_dispatch:

# Built-in GITHUB_TOKEN needs secrets:write to update the token secret
permissions:
  contents: read
  secrets: write

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Decode token secret → token.json on disk
      #    app.py reads this file to authenticate and writes it back after any refresh
      - name: Restore Google token
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          echo "$GOOGLE_TOKEN" | base64 -d > token.json
          echo "✅ token.json restored"

      # 5. Run the workflow (single execution — cron above handles scheduling)
      - name: Run workflow
        env:
          LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_API_KEY }}
        run: |
          echo "🚀 Starting Milkbasket PO workflow..."
          python app.py

      # 6. Push the (possibly refreshed) token.json back to the secret.
      #    Uses the built-in GITHUB_TOKEN + GitHub REST API — no PAT required.
      #    Runs with if: always() so a mid-run refresh is never lost.
      - name: Save refreshed token back to secret
        if: always()
        run: |
          if [ ! -f token.json ]; then
            echo "token.json not found — skipping secret update"
            exit 0
          fi

          NEW_TOKEN=$(base64 -w 0 token.json)

          # Fetch the repo's public key (required to encrypt secrets via the API)
          PUB_KEY_RESPONSE=$(gh api repos/${{ github.repository }}/actions/secrets/public-key)
          KEY_ID=$(echo "$PUB_KEY_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key_id'])")
          PUB_KEY=$(echo "$PUB_KEY_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key'])")

          # Encrypt the token value with the repo's libsodium public key
          pip install PyNaCl -q
          ENCRYPTED=$(PUB_KEY="$PUB_KEY" NEW_TOKEN="$NEW_TOKEN" python3 - <<'PYEOF'
          import sys, base64, os
          from nacl import encoding, public
          public_key = public.PublicKey(os.environ["PUB_KEY"].encode(), encoding.Base64Encoder)
          encrypted = public.SealedBox(public_key).encrypt(os.environ["NEW_TOKEN"].encode())
          print(base64.b64encode(encrypted).decode())
          PYEOF
          )

          # Update the secret via the REST API
          gh api \
            --method PUT \
            repos/${{ github.repository }}/actions/secrets/GOOGLE_TOKEN \
            -f key_id="$KEY_ID" \
            -f encrypted_value="$ENCRYPTED"

          echo "✅ GOOGLE_TOKEN secret updated successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Cleanup — remove credentials from the runner
      - name: Cleanup credentials
        if: always()
        run: |
          rm -f token.json
          echo "🧹 Cleaned up temporary files"

      # 8. Upload logs as artifact
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milkbasket-workflow-logs-${{ github.run_number }}
          path: "*.log"
          retention-days: 30
