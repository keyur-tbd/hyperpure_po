name: Milkbasket GRN Scheduler

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Decode and restore credentials
      - name: Restore Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          echo "$GOOGLE_CREDENTIALS" | base64 -d > credentials.json
          echo "$GOOGLE_TOKEN" | base64 -d > token.json
          echo "✅ Credentials restored"

      # 5. Set environment variables
      - name: Set environment variables
        run: |
          echo "LLAMA_CLOUD_API_KEY=${{ secrets.LLAMA_API_KEY }}" >> $GITHUB_ENV

      # 6. Run the workflow
      - name: Run workflow
        run: |
          echo "🚀 Starting Milkbasket GRN workflow..."
          python -c "
          from app import MilkbasketAutomation
          automation = MilkbasketAutomation()
          if automation.authenticate():
              automation.run_scheduled_workflow()
          else:
              print('❌ Authentication failed')
              exit(1)
          "

      # 7. Check if token was refreshed and update secret
      - name: Check if token was updated
        id: check_token
        run: |
          if [ -f token.json ]; then
            NEW_TOKEN=$(base64 -w 0 token.json)
            echo "token_updated=true" >> $GITHUB_OUTPUT
            echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "token_updated=false" >> $GITHUB_OUTPUT
          fi

      # 8. Persist refreshed token back to GitHub Secrets
      - name: Update GOOGLE_TOKEN secret if refreshed
        if: steps.check_token.outputs.token_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set GOOGLE_TOKEN --body "${{ steps.check_token.outputs.new_token }}"
          echo "🔄 Token secret updated"

      # 9. Cleanup credentials from runner
      - name: Cleanup credentials
        if: always()
        run: |
          rm -f credentials.json token.json
          echo "🧹 Cleaned up temporary files"

      # 10. Upload logs as artifact
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milkbasket-workflow-logs-${{ github.run_number }}
          path: hyperpure_automation.log
          retention-days: 30
